<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela Periódica Interativa</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>

/* ===== VARIÁVEIS / TEMAS ===== */
:root {
  --bg-deep:    #0d0d12;
  --bg-panel:   #13131a;
  --bg-card:    #1a1a24;
  --bg-hover:   #22223a;
  --border:     #2a2a3d;
  --accent:     #ffffff;
  --text-main:  #ffffff;
  --text-dim:   #7a7a9a;
  --c-solid:    #4a9eff;
  --c-liquid:   #ff5252;
  --c-gas:      #69f0ae;
  --c-unknown:  #777;
  --c-transition: #f39c12;
  --c-lanthanide: #9b59b6;
}
[data-theme="light"] {
  --bg-deep:   #f0f0f5;
  --bg-panel:  #e4e4ee;
  --bg-card:   #ffffff;
  --bg-hover:  #dde0f0;
  --border:    #c0c0d8;
  --accent:    #0077aa;
  --text-main: #111122;
  --text-dim:  #555570;
}
[data-contrast="high"] {
  --bg-deep:   #000000;
  --bg-panel:  #000000;
  --bg-card:   #111111;
  --bg-hover:  #222222;
  --border:    #ffffff;
  --accent:    #ffff00;
  --text-main: #ffffff;
  --text-dim:  #dddddd;
}

/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;}

/* ===== SKIP LINK ===== */
.skip-link{
  position:absolute;top:-9999px;left:-9999px;
  background:var(--accent);color:#000;padding:8px 16px;border-radius:4px;
  font-weight:700;z-index:9999;font-family:'Rajdhani',sans-serif;text-decoration:none;
}
.skip-link:focus{top:8px;left:8px;}

/* ===== LAYOUT ===== */
body{
  background:var(--bg-deep);color:var(--text-main);
  font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;
  height:100vh;overflow:hidden;
}

/* ===== TOOLBAR DE ACESSIBILIDADE — bottom-left ===== */
.toolbar{
  position:fixed;bottom:12px;left:12px;
  display:flex;gap:5px;z-index:200;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:8px;
  padding:5px 7px;
}
.toolbar-btn{
  background:transparent;
  border:1px solid transparent;
  color:var(--text-dim);
  border-radius:5px;
  padding:4px 9px;
  cursor:pointer;
  font-size:0.72rem;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  letter-spacing:.04em;
  transition:background 0.15s,color 0.15s,border-color 0.15s;
  white-space:nowrap;
}
.toolbar-btn:hover,.toolbar-btn:focus-visible{
  background:var(--bg-hover);color:var(--text-main);
  border-color:var(--accent);
  outline:2px solid var(--accent);outline-offset:2px;
}
.toolbar-btn[aria-pressed="true"]{
  background:var(--accent);color:#000;border-color:var(--accent);
}
.toolbar-sep{width:1px;background:var(--border);margin:2px 2px;}

/* ===== TABELA ===== */
.main-content{flex:1;display:flex;flex-direction:column;padding:6px 8px 4px;overflow:hidden;min-width:0;}
#periodic-table{
  display:grid;
  grid-template-columns:18px repeat(18,1fr);
  grid-template-rows:18px repeat(7,1fr) 5px 1fr 1fr;
  gap:3px;flex:1;min-height:0;
}
.family-label{
  grid-row:1;display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:0.9rem;color:var(--text-dim);
  border-bottom:1px solid var(--border);user-select:none;
}
.period-label{
  grid-column:1;display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--text-dim);user-select:none;
}

/* ===== LEGENDA DEMO ===== */
.legend-demo-cell{
  grid-column:3/6;grid-row:3/5;
  background:var(--bg-deep);padding:16px;
  display:flex;flex-direction:column;justify-content:center;gap:10px;
  z-index:2;overflow:hidden;
}
.demo-card-wrap{display:flex;align-items:center;gap:10px;}
.demo-card{
  width:150px;height:150px;flex-shrink:0;background:var(--bg-card);
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
}
.demo-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-transition);}
.demo-card .d-num{font-family:'Share Tech Mono',monospace;font-size:2rem;color:var(--text-dim);align-self:flex-start;padding-left:5px;line-height:1;}
.demo-card .d-sym{font-family:'Rajdhani',sans-serif;font-size:5rem;font-weight:700;color:var(--c-transition);line-height:1;}
.demo-card .d-name{font-size:1rem;color:var(--text-dim);white-space:nowrap;line-height:1;}
.demo-card .d-dot{position:absolute;top:2px;right:2px;}
.demo-labels{display:flex;flex-direction:column;gap:4px;font-size:0.8rem;color:var(--text-dim);}
.demo-labels span{display:flex;align-items:center;gap:0px;}
.demo-labels b{color:var(--text-dim);font-weight:600;}
.demo-lbar{display:inline-block;width:3px;height:10px;background:var(--c-transition);border-radius:1px;flex-shrink:0;}

/* ===== LEGENDA CATS + ESTADOS ===== */
.legend-cats-cell{
  grid-column:7/14;grid-row:2/4;
  background:var(--bg-deep);
  padding:7px 10px;z-index:2;
  display:flex;flex-direction:column;justify-content:space-evenly;gap:3px;
}
.legend-section-label{
  font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-dim);padding-bottom:1px;
}
.legend-cats{
  display:grid;grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(4,auto);
  gap:3px;flex:1;min-height:0;
}
.legend-states{
  display:grid;grid-template-columns:repeat(4,1fr);gap:3px;
}
.legend-divider{height:1px;background:var(--border);flex-shrink:0;margin:2px 0;}

/* ===== BOTÕES DE FILTRO (legend-item) ===== */
.legend-item{
  display:flex;align-items:center;gap:5px;
  font-size:clamp(0.62rem,0.58vw,1rem);font-weight:600;
  color:var(--text-dim);
  white-space:normal;cursor:pointer;padding:2px 4px;border-radius:3px;
  border:1px solid transparent;
  transition:all 0.15s;user-select:none;
  background:transparent;
  font-family:'Rajdhani',sans-serif;
}
.legend-item:hover,.legend-item:focus-visible{
  background:var(--bg-hover);color:var(--text-main);
  border-color:var(--border);
  outline:2px solid var(--accent);outline-offset:2px;
}
/* Estado ativo: usa a cor da categoria diretamente via variável inline */
.legend-item.ativo{
  color:#fff;
  border-color:var(--item-color, var(--accent));
  background:color-mix(in srgb, var(--item-color, var(--accent)) 20%, transparent);
}
[data-theme="light"] .legend-item.ativo{color:#111;}

.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* ===== ELEMENTOS ===== */
.element{
  background:var(--bg-card);border:1px solid var(--border);border-radius:3px;
  padding:2px 2px 1px;text-align:center;cursor:pointer;
  transition:transform 0.15s,background 0.15s,box-shadow 0.15s,opacity 0.2s;
  user-select:none;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;min-height:0;
}
.element::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat-color,#444);border-radius:3px 0 0 3px;}
.element:hover,.element:focus-visible{
  transform:scale(1.15);background:var(--bg-hover);
  box-shadow:0 0 12px rgba(0,229,255,0.25);z-index:20;border-color:var(--accent);
  outline:2px solid var(--accent);outline-offset:2px;
}
.element.selected{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--bg-card));box-shadow:0 0 10px rgba(0,229,255,0.3);}
.element.dim{opacity:0.1;pointer-events:none;}
@media(prefers-reduced-motion:reduce){
  .element,.legend-item,.toolbar-btn{transition:none!important;animation:none!important;}
}
.el-number{font-family:'Share Tech Mono',monospace;font-size:0.9rem;color:var(--text-dim);align-self:flex-start;line-height:2;padding-left:5px;}
.el-symbol{font-family:'Rajdhani',sans-serif;font-size:clamp(3rem,0.95vw,2rem);font-weight:700;line-height:1;margin:1px 0;}
.el-name{font-size:clamp(0.9rem,0.47vw,0.55rem);color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center;line-height:1;}
.state-dot{position:absolute;top:2px;right:2px;font-size:0.75rem;background:transparent;}
.serie-toggle{border-style:dashed !important;padding:4px 2px !important;}
.serie-toggle .toggle-arrow{font-size:0.55rem;display:block;transition:transform 0.3s;line-height:1;}
.serie-toggle.aberta .toggle-arrow{transform:rotate(180deg);}
.linha-serie{display:contents;}
.linha-serie.recolhida > .element{display:none;}
@keyframes fadeIn{from{opacity:0;transform:scaleY(0.5);}to{opacity:1;transform:scaleY(1);}}
.linha-serie .element{animation:fadeIn 0.2s ease forwards;}
.serie-separator{grid-column:1/-1;height:5px;}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.72);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:500;
  opacity:0;visibility:hidden;
  transition:opacity 0.25s,visibility 0.25s;
}
.modal-overlay.aberto{opacity:1;visibility:visible;}
.modal{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:12px;
  width:min(560px,95vw);
  max-height:90vh;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,0.6);
  transform:scale(0.93) translateY(16px);
  transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.aberto .modal{transform:scale(1) translateY(0);}

.modal-header{
  padding:14px 16px 10px;
  background:var(--bg-deep);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:5;
  flex-shrink:0;
}
.modal-top-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px;}
.modal-sym-col{display:flex;flex-direction:column;align-items:flex-start;}
.modal-symbol{font-family:'Rajdhani',sans-serif;font-size:4.5rem;font-weight:700;line-height:1;}
.modal-number{font-family:'Share Tech Mono',monospace;font-size:1.2rem;color:var(--text-dim);}
.modal-info-col{flex:1;display:flex;flex-direction:column;gap:3px;padding-top:4px;}
.modal-name{font-size:1.3rem;font-weight:700;}
.modal-mass{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--accent);}
.modal-meta{font-size:0.85rem;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase;line-height:1.4;}
.modal-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.badge{padding:2px 8px;border-radius:20px;font-size:0.65rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid transparent;}
.modal-close-btn{
  margin-left:auto;align-self:flex-start;
  background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--text-dim);
  width:30px;height:30px;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.modal-close-btn:hover,.modal-close-btn:focus-visible{
  background:var(--bg-hover);color:var(--text-main);border-color:var(--accent);
  outline:2px solid var(--accent);outline-offset:2px;
}

.modal-body{
  padding:12px 14px;
  display:flex;flex-direction:column;gap:10px;
  overflow-y:auto;
}
.modal-body::-webkit-scrollbar{width:4px;}
.modal-body::-webkit-scrollbar-track{background:transparent;}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.info-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-left:3px solid var(--accent);border-radius:6px;padding:9px 11px;
}
.info-card h4{
  font-size:0.7rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text-dim);margin-bottom:6px;
}
.info-card p{font-size:0.95rem;line-height:1.55;color:var(--text-main);opacity:.85;}
.particles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.particle-box{
  background:var(--bg-deep);border-radius:5px;padding:6px 4px;
  text-align:center;border:1px solid var(--border);
}
.particle-box .pval{font-family:'Share Tech Mono',monospace;font-size:1.4rem;font-weight:700;display:block;}
.particle-box .plabel{font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;}
.electron-config{display:flex;flex-direction:column;gap:4px;}
.ec-title{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:1px;}
.ec-full{font-family:'Share Tech Mono',monospace;font-size:0.95rem;color:var(--accent);line-height:1.5;word-break:break-all;margin-bottom:5px;}
.ec-camadas{display:flex;flex-direction:column;gap:2px;}
.ec-row{display:flex;align-items:baseline;gap:6px;}
.ec-camada-name{font-size:0.85rem;font-weight:700;color:var(--text-main);width:14px;flex-shrink:0;font-family:'Share Tech Mono',monospace;}
.ec-orbitals{display:flex;flex-wrap:wrap;gap:3px;}
.ec-orbital{font-size:0.85rem;font-family:'Share Tech Mono',monospace;white-space:nowrap;}

/* ===== FOCO GLOBAL ===== */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

/* ===== LIVE REGION ===== */
#live-region{
  position:absolute;width:1px;height:1px;overflow:hidden;
  clip:rect(0,0,0,0);white-space:nowrap;
}

</style>
</head>
<body>

<a href="#periodic-table" class="skip-link">Pular para a tabela periódica</a>
<div id="live-region" aria-live="polite" aria-atomic="true" role="status"></div>

<!-- Toolbar de acessibilidade — canto inferior esquerdo -->
<div class="toolbar" role="toolbar" aria-label="Opções de acessibilidade">
  <button class="toolbar-btn" id="btnTheme"    aria-pressed="false">🌙 Claro</button>
  <div class="toolbar-sep"></div>
  <button class="toolbar-btn" id="btnContrast" aria-pressed="false">⬛ Contraste</button>
  <div class="toolbar-sep"></div>
  <button class="toolbar-btn" id="btnFontUp"   aria-label="Aumentar fonte">A+</button>
  <button class="toolbar-btn" id="btnFontDown" aria-label="Diminuir fonte">A−</button>
</div>

<!-- Modal de detalhes -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalName" aria-hidden="true">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-top-row">
        <div class="modal-sym-col" aria-hidden="true">
          <span class="modal-symbol" id="modalSymbol"></span>
          <span class="modal-number" id="modalNumber"></span>
        </div>
        <div class="modal-info-col">
          <div class="modal-name"  id="modalName"></div>
          <div class="modal-mass"  id="modalMass"></div>
          <div class="modal-meta"  id="modalMeta"></div>
          <div class="modal-badges" id="modalBadges"></div>
        </div>
        <button class="modal-close-btn" id="btnClose" aria-label="Fechar detalhes do elemento">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <section class="info-card" id="stateCard" aria-labelledby="stateCardTitle">
        <h4 id="stateCardTitle">🌡️ Estado físico (25 °C, 1 atm)</h4>
        <p id="modalState">—</p>
        <div class="particles-grid" id="modalParticles" aria-label="Partículas subatômicas"></div>
      </section>
      <section class="info-card" aria-labelledby="configTitle">
        <h4 id="configTitle">⚛️ Distribuição Eletrônica (Pauling)</h4>
        <div class="electron-config" id="modalConfig"></div>
      </section>
      <section class="info-card" aria-labelledby="obtencaoTitle">
        <h4 id="obtencaoTitle">🔧 Como é obtido</h4>
        <p id="modalObtencao">—</p>
      </section>
      <section class="info-card" aria-labelledby="curiosidadeTitle">
        <h4 id="curiosidadeTitle">💡 Curiosidades</h4>
        <p id="modalCuriosidade">—</p>
      </section>
    </div>
  </div>
</div>

<main class="main-content" role="main">
  <div id="periodic-table"
    role="grid"
    aria-label="Tabela Periódica. Setas para navegar, Enter/Espaço para detalhes."
    tabindex="0"
  ></div>
</main>

<script>
// ===== TOOLBAR =====
let fontScale = 1;
const btnTheme    = document.getElementById('btnTheme');
const btnContrast = document.getElementById('btnContrast');
const btnFontUp   = document.getElementById('btnFontUp');
const btnFontDown = document.getElementById('btnFontDown');

btnTheme.addEventListener('click',()=>{
  const isLight = document.documentElement.getAttribute('data-theme')==='light';
  document.documentElement.setAttribute('data-theme', isLight?'':'light');
  btnTheme.setAttribute('aria-pressed', String(!isLight));
  btnTheme.textContent = isLight ? '🌙 Claro' : '☀️ Escuro';
  anunciar(isLight?'Modo escuro ativado':'Modo claro ativado');
});
btnContrast.addEventListener('click',()=>{
  const isHigh = document.documentElement.getAttribute('data-contrast')==='high';
  document.documentElement.setAttribute('data-contrast', isHigh?'':'high');
  btnContrast.setAttribute('aria-pressed', String(!isHigh));
  anunciar(isHigh?'Alto contraste desativado':'Alto contraste ativado');
});
btnFontUp.addEventListener('click',()=>{
  fontScale = Math.min(fontScale+0.1,1.5);
  document.documentElement.style.fontSize=(fontScale*16)+'px';
  anunciar('Fonte aumentada');
});
btnFontDown.addEventListener('click',()=>{
  fontScale = Math.max(fontScale-0.1,0.8);
  document.documentElement.style.fontSize=(fontScale*16)+'px';
  anunciar('Fonte diminuída');
});
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches){
  document.documentElement.setAttribute('data-theme','light');
  btnTheme.textContent='☀️ Escuro';
}

function anunciar(msg){
  const lr=document.getElementById('live-region');
  lr.textContent='';

}

const MAX_SUB={s:2,p:6,d:10,f:14};

function distribuirEletrons(Z){
  let e=Z,dist={};
  for(const sub of ORDEM_SUBNIVEIS){
    if(e<=0)break;
    const tipo=sub[sub.length-1];
    const max=MAX_SUB[tipo];
    const fill=Math.min(e,max);
    if(fill>0){dist[sub]=fill;e-=fill;}
  }
  return dist;
}
function porCamada(dist){
  const camadas={};
  for(const[sub,e] of Object.entries(dist)){
    const n=parseInt(sub[0]);
    if(!camadas[n]) camadas[n]=[];
    camadas[n].push({sub,e});
  }
  return camadas;
}

// ===== MODAL =====
const modalOverlay = document.getElementById('modalOverlay');
const btnClose     = document.getElementById('btnClose');

function abrirModal(el,divEl){
  const est = ESTADO[el.numero]||'?';
  const cc  = CAT_COLOR[el.cat]||'#444';

  // Toggle — clicar duas vezes fecha
  if(elementoAtivo===el.numero){fecharModal();return;}
  if(divAtiva) divAtiva.classList.remove('selected');
  elementoAtivo=el.numero; divAtiva=divEl;
  divEl.classList.add('selected');

  // Cabeçalho
  const sym = document.getElementById('modalSymbol');
  sym.textContent = el.simbolo; sym.style.color = cc;
  document.getElementById('modalNumber').textContent = '#'+el.numero;
  const nm = document.getElementById('modalName');
  nm.textContent = el.nome; nm.style.color = cc;
  document.getElementById('modalMass').textContent = 'Massa: '+(MASSA[el.numero]||'—')+' u';
  const familia = FAMILIA[el.grupo]||'—';
  const periodo = (el.periodo||0)<=7 ? el.periodo : (el.cat==='Lantanídeo'?6:7);
  document.getElementById('modalMeta').textContent = 'Família '+familia+' · Período '+periodo+' · '+el.cat;

  // Badge estado
  const estCol = ESTADO_COLOR[est];
  document.getElementById('modalBadges').innerHTML =
    `<span class="badge" style="background:${estCol}22;color:${estCol};border-color:${estCol}55">${ESTADO_DOT[est]} ${ESTADO_LABEL[est]}</span>`+
    `<span class="badge" style="background:${cc}22;color:${cc};border-color:${cc}55">${el.cat}</span>`;

  // Estado + partículas
  document.getElementById('stateCard').style.borderLeftColor = estCol;
  document.getElementById('modalState').textContent = ESTADO_DESC[est];
  const Z=el.numero, N=calcNeutrons(Z);
  document.getElementById('modalParticles').innerHTML =
    `<div class="particle-box"><span class="pval" style="color:#f39c12">${Z}</span><span class="plabel">Prótons</span></div>`+
    `<div class="particle-box"><span class="pval" style="color:#9b59b6">${N}</span><span class="plabel">Nêutrons</span></div>`+
    `<div class="particle-box"><span class="pval" style="color:#3498db">${Z}</span><span class="plabel">Elétrons</span></div>`;

  // Config eletrônica
  document.getElementById('modalConfig').innerHTML = renderConfig(Z);
  document.getElementById('modalObtencao').textContent   = el.obtencao||'—';
  document.getElementById('modalCuriosidade').textContent= CURIOSIDADES[el.numero]||'—';

  // Abre Modal
  modalOverlay.classList.add('aberto');
  modalOverlay.setAttribute('aria-hidden','false');
  anunciar(`${el.nome}, número atômico ${Z}, ${el.cat}, ${ESTADO_LABEL[est]}.`);

}

function fecharModal(){
  modalOverlay.classList.remove('aberto');
  modalOverlay.setAttribute('aria-hidden','true');
  if(divAtiva){divAtiva.classList.remove('selected');divAtiva.focus();}
  elementoAtivo=null; divAtiva=null;
  anunciar('Painel fechado.');
}

btnClose.addEventListener('click',fecharModal);
modalOverlay.addEventListener('click',(e)=>{if(e.target===modalOverlay)fecharModal();});
document.addEventListener('keydown',(e)=>{
  if(e.key==='Escape'&&modalOverlay.classList.contains('aberto'))fecharModal();
});
modalOverlay.addEventListener('keydown',(e)=>{
  if(e.key!=='Tab') return;
  const focusables = modalOverlay.querySelectorAll('button,[tabindex="0"],[href],input,select,textarea');
  const first=focusables[0], last=focusables[focusables.length-1];
  if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus();}}
  else{if(document.activeElement===last){e.preventDefault();first.focus();}}
});

// ===== CONFIG ELETRÔNICA =====
function renderConfig(Z){
  const dist=distribuirEletrons(Z);
  const camadas=porCamada(dist);
  const notacao=CONFIG_EC[Z]||'Dados não disponíveis';
  let html=`<div class="ec-title">Notação eletrônica</div>
<div class="ec-full">${notacao}</div>
<div class="ec-title" style="margin-top:5px">Por camada (Diagrama de Pauling)</div>
<div class="ec-camadas">`;
  const nMax=Object.keys(camadas).length;
  for(let n=1;n<=nMax;n++){
    const nome=CAMADAS_NOME[n-1]||'?';
    const subs=camadas[n]||[];
    const orbs=subs.map(({sub,e})=>{
      const tipo=sub[1];
      const col={s:'var(--c-solid)',p:'var(--c-gas)',d:'var(--c-transition)',f:'var(--c-lanthanide)'}[tipo]||'#aaa';
      const exp=String(e).split('').map(d=>'\u2070\u00B9\u00B2\u00B3\u2074\u2075\u2076\u2077\u2078\u2079'[parseInt(d)]).join('');
      return `<span class="ec-orbital" style="color:${col}">${sub}${exp}</span>`;
    }).join(' ');
    html+=`<div class="ec-row"><span class="ec-camada-name">${nome}</span><div class="ec-orbitals">${orbs}</div></div>`;
  }
  html+='</div>';
  return html;
}

// ===== FILTROS =====
function aplicarDim(){
  document.querySelectorAll('.element[data-cat]').forEach(e=>{
    const Z=parseInt(e.dataset.z)||0;
    const est=ESTADO[Z]||'?';
    const catOk=!filtroCategoria||e.dataset.cat===filtroCategoria;
    const estOk=!filtroEstado||est===filtroEstado;
    const visivel=catOk&&estOk;
    e.classList.toggle('dim',!visivel);
    e.setAttribute('aria-hidden',String(!visivel));
  });
  if(filtroEstado||filtroCategoria){
    const laMatch=lantanideos.some(el=>{
      const est=ESTADO[el.numero]||'?';
      return(!filtroCategoria||el.cat===filtroCategoria)&&(!filtroEstado||est===filtroEstado);
    });
    const acMatch=actinideos.some(el=>{
      const est=ESTADO[el.numero]||'?';
      return(!filtroCategoria||el.cat===filtroCategoria)&&(!filtroEstado||est===filtroEstado);
    });
    if(laMatch&&!estadoSeries.lantanideos) abrirSerie('lantanideos');
    if(!laMatch&&estadoSeries.lantanideos) fecharSerie('lantanideos');
    if(acMatch&&!estadoSeries.actinideos) abrirSerie('actinideos');
    if(!acMatch&&estadoSeries.actinideos) fecharSerie('actinideos');
  } else {
    fecharSerie('lantanideos');
    fecharSerie('actinideos');
  }
}

function aplicarFiltroCat(cat){
  filtroCategoria = filtroCategoria===cat ? null : cat;
  document.querySelectorAll('.legend-item[data-cat]').forEach(b=>{
    const ativo = b.dataset.cat===filtroCategoria;
    b.classList.toggle('ativo', ativo);
    b.setAttribute('aria-pressed', String(ativo));
    if(ativo){
      b.style.setProperty('--item-color', CAT_COLOR[b.dataset.cat]||'var(--accent)');
    } else {
      b.style.removeProperty('--item-color');
    }
  });
  aplicarDim();
  anunciar(filtroCategoria?`Filtro: ${filtroCategoria}`:'Filtro de categoria removido');
}

function aplicarFiltroEstado(est){
  filtroEstado = filtroEstado===est ? null : est;
  const ESTADO_COLORS_FILTER={S:'var(--c-solid)',L:'var(--c-liquid)',G:'var(--c-gas)','?':'var(--c-unknown)'};
  document.querySelectorAll('.legend-item[data-est]').forEach(b=>{
    const ativo = b.dataset.est===filtroEstado;
    b.classList.toggle('ativo', ativo);
    b.setAttribute('aria-pressed', String(ativo));
    if(ativo){
      b.style.setProperty('--item-color', ESTADO_COLORS_FILTER[b.dataset.est]||'var(--accent)');
    } else {
      b.style.removeProperty('--item-color');
    }
  });
  aplicarDim();
  anunciar(filtroEstado?`Filtro: ${ESTADO_LABEL[filtroEstado]}`:'Filtro de estado removido');
}

// ===== NAVEGAÇÃO POR TECLADO =====
function registrarPosicao(el,div){
  const key=`${el.periodo||0}_${el.grupo}`;
  if(!posicaoMap[key]) posicaoMap[key]=[];
  posicaoMap[key].push({el,div});
}
function encontrarVizinho(grupo,periodo){
  const key=`${periodo}_${grupo}`;
  const lista=posicaoMap[key];
  return lista&&lista.length?lista[0].div:null;
}
function navegarTabela(e,divAtual){
  const g=parseInt(divAtual.dataset.grupo)||0;
  const p=parseInt(divAtual.dataset.periodo)||0;
  let alvo=null;
  if(e.key==='ArrowRight') alvo=encontrarVizinho(g+1,p)||encontrarVizinho(g+2,p)||encontrarVizinho(g+3,p);
  if(e.key==='ArrowLeft')  alvo=encontrarVizinho(g-1,p)||encontrarVizinho(g-2,p)||encontrarVizinho(g-3,p);
  if(e.key==='ArrowDown')  alvo=encontrarVizinho(g,p+1)||encontrarVizinho(g,p+2);
  if(e.key==='ArrowUp')    alvo=encontrarVizinho(g,p-1)||encontrarVizinho(g,p-2);
  if(alvo){e.preventDefault();alvo.focus();}
}

// ===== CRIAÇÃO DOS ELEMENTOS =====
function criarEl(el){
  const div=document.createElement('div');
  div.className='element';
  div.dataset.cat=el.cat;
  div.dataset.z=el.numero;
  div.dataset.grupo=el.grupo;
  div.dataset.periodo=el.periodo||0;
  const est=ESTADO[el.numero]||'?';
  const cc=CAT_COLOR[el.cat]||'#444';
  div.style.setProperty('--cat-color',cc);
  div.setAttribute('role','gridcell');
  div.setAttribute('tabindex','0');
  div.setAttribute('aria-label',
    `${el.nome}, símbolo ${el.simbolo}, nº ${el.numero}, ${el.cat}, ${ESTADO_LABEL[est]}, grupo ${el.grupo}${el.periodo?', período '+el.periodo:''}`
  );
  div.innerHTML=
    `<div class="el-number" aria-hidden="true">${el.numero}</div>`+
    `<div class="el-symbol" style="color:${cc}" aria-hidden="true">${el.simbolo}</div>`+
    `<div class="el-name" aria-hidden="true">${el.nome}</div>`+
    `<div class="state-dot" aria-hidden="true">${ESTADO_DOT[est]}</div>`;
  div.addEventListener('click',()=>abrirModal(el,div));
  div.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'||e.key===' '){e.preventDefault();abrirModal(el,div);}
    navegarTabela(e,div);
  });
  registrarPosicao(el,div);
  return div;
}

function criarLegendaCatsEstados(){
  const cell=document.createElement('div');
  cell.className='legend-cats-cell';
  cell.style.gridColumn='7/13';
  cell.style.gridRow='2/5';
  cell.setAttribute('role','group');
  cell.setAttribute('aria-label','Filtros de categoria e estado físico');

  // Label Categorias
  const lc=document.createElement('div');
  lc.className='legend-section-label';lc.id='lblCats';lc.textContent='Categorias';
  cell.appendChild(lc);

  // Grid categorias
  const grid=document.createElement('div');
  grid.className='legend-cats';
  grid.setAttribute('role','group');grid.setAttribute('aria-labelledby','lblCats');
  Object.keys(CAT_COLOR).forEach(cat=>{
    const cor=CAT_COLOR[cat];
    const item=document.createElement('button');
    item.className='legend-item';
    item.dataset.cat=cat;
    item.setAttribute('aria-pressed','false');
    item.setAttribute('aria-label',`Filtrar: ${cat}`);
    item.innerHTML=`<div class="legend-dot" aria-hidden="true" style="background:${cor}"></div><span>${cat}</span>`;
    item.addEventListener('click',()=>aplicarFiltroCat(cat));
    grid.appendChild(item);
  });
  cell.appendChild(grid);

  // Divisor
  const dv=document.createElement('div');dv.className='legend-divider';cell.appendChild(dv);

  // Label Estados
  const le=document.createElement('div');
  le.className='legend-section-label';le.id='lblStates';le.textContent='Estado Físico (25°C · 1 atm)';
  cell.appendChild(le);

  // Grid estados
  const gridEst=document.createElement('div');
  gridEst.className='legend-states';
  gridEst.setAttribute('role','group');gridEst.setAttribute('aria-labelledby','lblStates');
  [{k:'S',label:'Sólido',emoji:'🧊',col:'var(--c-solid)'},
   {k:'L',label:'Líquido',emoji:'💧',col:'var(--c-liquid)'},
   {k:'G',label:'Gasoso',emoji:'💨',col:'var(--c-gas)'},
   {k:'?',label:'Desconhecido',emoji:'🌀',col:'var(--c-unknown)'}
  ].forEach(({k,label,emoji})=>{
    const item=document.createElement('button');
    item.className='legend-item';
    item.dataset.est=k;
    item.setAttribute('aria-pressed','false');
    item.setAttribute('aria-label',`Filtrar: ${label}`);
    item.innerHTML=`<span aria-hidden="true" style="font-size:1.1rem">${emoji}</span><span>${label}</span>`;
    item.addEventListener('click',()=>aplicarFiltroEstado(k));
    gridEst.appendChild(item);
  });
  cell.appendChild(gridEst);
  return cell;
}

// ===== RÓTULOS =====
function criarRotulos(c){
  for(let g=1;g<=18;g++){
    const d=document.createElement('div');d.className='family-label';
    d.style.cssText=`grid-column:${g+1};grid-row:1;`;
    d.textContent=g;d.setAttribute('aria-label',`Grupo ${g}`);
    c.appendChild(d);
  }
  for(let p=1;p<=7;p++){
    const d=document.createElement('div');d.className='period-label';
    d.style.cssText=`grid-column:1;grid-row:${p+2};`;
    d.textContent=p;d.setAttribute('aria-label',`Período ${p}`);
    c.appendChild(d);
  }
}

// ===== BOTÕES SÉRIES =====
function criarBotaoSerie(serie){
  const cfgs={
    lantanideos:{numero:'57-71',simbolo:'La-Lu',nome:'Lantanídeos',grupo:3,periodo:6,cat:'Lantanídeo',
      obtencao:'Série dos lantanídeos (Z=57–71). Clique para expandir.',
      curiosidade:'15 elementos (terras raras) usados em ímãs, lasers e fibra óptica.'},
    actinideos:{numero:'89-103',simbolo:'Ac-Lr',nome:'Actinídeos',grupo:3,periodo:7,cat:'Actinídeo',
      obtencao:'Série dos actinídeos (Z=89–103). Clique para expandir.',
      curiosidade:'15 elementos, maioria radioativa; incluem urânio e plutônio.'}
  };
  const cfg=cfgs[serie];
  const cc=CAT_COLOR[cfg.cat];
  const div=document.createElement('div');
  div.className='element serie-toggle';
  div.dataset.cat=cfg.cat;div.dataset.z=cfg.numero;
  div.dataset.grupo=cfg.grupo;div.dataset.periodo=cfg.periodo;
  div.setAttribute('role','button');div.setAttribute('tabindex','0');
  div.setAttribute('aria-expanded','false');
  div.setAttribute('aria-label',`${serie==='lantanideos'?'Lantanídeos':'Actinídeos'} (${cfg.numero}). Enter para expandir/recolher.`);
  div.style.cssText=`grid-column:${cfg.grupo+1};grid-row:${cfg.periodo+1};--cat-color:${cc}`;
  div.innerHTML=
    `<div class="el-number" aria-hidden="true" style="font-size:.38rem">${cfg.numero}</div>`+
    `<div class="el-symbol" aria-hidden="true" style="color:${cc};font-size:.58rem;line-height:1.1">${cfg.simbolo}</div>`+
    `<div class="el-name" aria-hidden="true">${cfg.nome}</div>`+
    `<span class="toggle-arrow" aria-hidden="true" style="color:${cc}">&#9660;</span>`;
  const handler=()=>{
    abrirModal({...cfg,numero:cfg.numero,grupo:cfg.grupo},div);
    estadoSeries[serie]=!estadoSeries[serie];
    div.classList.toggle('aberta',estadoSeries[serie]);
    div.setAttribute('aria-expanded',String(estadoSeries[serie]));
    const l=document.getElementById(`linha-${serie}`);
    if(l) l.classList.toggle('recolhida',!estadoSeries[serie]);
    anunciar(estadoSeries[serie]?`Série expandida`:`Série recolhida`);
  };
  div.addEventListener('click',handler);
  div.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'||e.key===' '){e.preventDefault();handler();}
    navegarTabela(e,div);
  });
  botoesToggle[serie]=div;
  return div;
}

function criarLinha(serie,els,row){
  const w=document.createElement('div');
  w.id=`linha-${serie}`;w.className='linha-serie recolhida';
  w.setAttribute('role','row');
  els.forEach(el=>{
    const d=criarEl(el);
    d.style.gridColumn=el.grupo+1;d.style.gridRow=row;
    w.appendChild(d);
  });
  return w;
}

// ===== RENDER =====
function renderizar(){
  const c=document.getElementById('periodic-table');
  criarRotulos(c);
  c.appendChild(criarLegendaDemo());
  c.appendChild(criarLegendaCatsEstados());
  elementosBase.forEach(el=>{
    const d=criarEl(el);d.style.gridColumn=el.grupo+1;d.style.gridRow=el.periodo+1;c.appendChild(d);
  });
  c.appendChild(criarBotaoSerie('lantanideos'));
  c.appendChild(criarBotaoSerie('actinideos'));
  const sep=document.createElement('div');
  sep.className='serie-separator';sep.style.gridRow='9';sep.setAttribute('aria-hidden','true');
  c.appendChild(sep);
  c.appendChild(criarLinha('lantanideos',lantanideos,10));
  c.appendChild(criarLinha('actinideos',actinideos,11));
}
renderizar();
